name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-electron:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: macos-arm64
            platform: macos-latest
            electron_platform: darwin
            electron_arch: arm64
            build_args: ""
          - artifact_name: macos-x64
            platform: macos-latest
            electron_platform: darwin
            electron_arch: x64
            build_args: "--x64"
          - artifact_name: windows-x64
            platform: windows-latest
            electron_platform: win32
            electron_arch: x64
            build_args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      POSTHOG_ENABLED: "true"
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          NUCLEUS_SKIP_DESKTOP_POSTINSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Build release assets
        shell: bash
        run: |
          rm -rf release apps/desktop/dist
          bun run --cwd apps/desktop build
          bun run --cwd apps/desktop prepare:runtime-env
          (cd apps/desktop && bun x electron-builder install-app-deps --platform ${{ matrix.electron_platform }} --arch ${{ matrix.electron_arch }})
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            has_all() {
              for value in "$@"; do
                if [[ -z "$value" ]]; then
                  return 1
                fi
              done
              return 0
            }

            if ! has_all "$CSC_LINK" "$CSC_KEY_PASSWORD"; then
              echo "Missing macOS Developer ID signing certificate secrets: CSC_LINK and CSC_KEY_PASSWORD." >&2
              exit 1
            fi

            cert_path="$RUNNER_TEMP/nucleus-developer-id.p12"
            keychain_path="$RUNNER_TEMP/nucleus-signing.keychain-db"
            keychain_password="$(uuidgen)"
            existing_keychains="$(security list-keychains -d user | tr -d '\"')"

            printf '%s' "$CSC_LINK" | base64 -D > "$cert_path"
            security create-keychain -p "$keychain_password" "$keychain_path"
            security set-keychain-settings -lut 21600 "$keychain_path"
            security unlock-keychain -p "$keychain_password" "$keychain_path"
            security import "$cert_path" -k "$keychain_path" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign
            security list-keychains -d user -s "$keychain_path" $existing_keychains
            security default-keychain -s "$keychain_path"
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
            security find-identity -v -p codesigning
            export CSC_KEYCHAIN="$keychain_path"
            unset CSC_LINK
            unset CSC_KEY_PASSWORD

            if has_all "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS notarization enabled with App Store Connect API key."
            elif has_all "$APPLE_ID" "$APPLE_APP_SPECIFIC_PASSWORD" "$APPLE_TEAM_ID"; then
              echo "macOS notarization enabled with Apple ID credentials."
            else
              echo "Missing macOS notarization secrets. Provide APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER, or APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID." >&2
              exit 1
            fi

            du -sh apps/desktop/out apps/desktop/node_modules node_modules || true
            DEBUG=electron-builder,electron-builder:* DEBUG_COLORS=false ./node_modules/.bin/electron-builder --projectDir apps/desktop --publish never ${{ matrix.build_args }}
          else
            ./node_modules/.bin/electron-builder --projectDir apps/desktop --publish never ${{ matrix.build_args }}
          fi

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            release/*.blockmap
            release/*.dmg
            release/*.exe
            release/*.yml
            release/*.zip

  publish-release:
    needs: build-electron
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download arm64 mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download x64 mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: release-artifacts/macos-x64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-artifacts/windows-x64

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-artifacts/staged
          cp release-artifacts/macos-arm64/* release-artifacts/staged/
          cp release-artifacts/windows-x64/* release-artifacts/staged/
          find release-artifacts/macos-x64 -maxdepth 1 -type f ! -name 'latest-mac.yml' -exec cp {} release-artifacts/staged/ \;
          cp release-artifacts/macos-x64/latest-mac.yml release-artifacts/macos-x64/latest-mac-x64.yml

      - name: Merge mac update manifests
        run: |
          bun run scripts/merge-mac-update-manifests.ts \
            --arm64 release-artifacts/macos-arm64/latest-mac.yml \
            --x64 release-artifacts/macos-x64/latest-mac-x64.yml \
            --output release-artifacts/staged/latest-mac.yml

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: release-artifacts/staged/*
          generate_release_notes: true
