name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-electron:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: macos-arm64
            platform: blacksmith-6vcpu-macos-15
            electron_platform: darwin
            electron_arch: arm64
            build_args: ""
          - artifact_name: macos-x64
            platform: blacksmith-6vcpu-macos-15
            electron_platform: darwin
            electron_arch: x64
            build_args: "--x64"
          - artifact_name: windows-x64
            platform: windows-latest
            electron_platform: win32
            electron_arch: x64
            build_args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      POSTHOG_ENABLED: "true"
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        env:
          VFACTOR_SKIP_DESKTOP_POSTINSTALL: "1"
        run: bun install --frozen-lockfile

      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build release assets
        shell: bash
        run: |
          fail_with_context() {
            local exit_code=$?
            echo "::group::release diagnostics"
            security find-identity -v -p codesigning || true
            find release -maxdepth 2 -type f -exec ls -lh {} \; 2>/dev/null || true
            ps -axo pid,stat,etime,command | grep -E 'electron-builder|codesign|notarytool|hdiutil|ditto|app-builder' | grep -v grep || true
            echo "::endgroup::"
            exit "$exit_code"
          }

          run_with_timeout() {
            local timeout_seconds="$1"
            shift
            "$@" &
            local command_pid=$!
            (
              sleep "$timeout_seconds"
              echo "::error::Command timed out after ${timeout_seconds}s: $*"
              ps -axo pid,stat,etime,command | grep -E 'electron-builder|codesign|notarytool|hdiutil|ditto|app-builder' | grep -v grep || true
              kill -TERM "$command_pid" 2>/dev/null || true
              sleep 10
              kill -KILL "$command_pid" 2>/dev/null || true
            ) &
            local watchdog_pid=$!
            wait "$command_pid"
            local status=$?
            kill "$watchdog_pid" 2>/dev/null || true
            wait "$watchdog_pid" 2>/dev/null || true
            return "$status"
          }

          trap fail_with_context ERR

          rm -rf release apps/desktop/dist
          bun run --cwd apps/desktop build
          bun run --cwd apps/desktop prepare:runtime-env
          (cd apps/desktop && bun x electron-builder install-app-deps --platform ${{ matrix.electron_platform }} --arch ${{ matrix.electron_arch }})
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            has_all() {
              for value in "$@"; do
                if [[ -z "$value" ]]; then
                  return 1
                fi
              done
              return 0
            }

            signing_identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
            if [[ -z "$signing_identity" ]]; then
              echo "No Developer ID Application signing identity is available after importing CSC_LINK." >&2
              exit 1
            fi

            preflight_binary="$RUNNER_TEMP/vfactor-codesign-preflight"
            printf '#!/bin/sh\nexit 0\n' > "$preflight_binary"
            chmod +x "$preflight_binary"
            echo "Running codesign preflight with: $signing_identity"
            run_with_timeout 90 /usr/bin/codesign --force --timestamp --options runtime --sign "$signing_identity" "$preflight_binary"
            /usr/bin/codesign --verify --verbose=2 "$preflight_binary"

            if has_all "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              chmod 600 "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS notarization enabled with App Store Connect API key."
            elif has_all "$APPLE_ID" "$APPLE_APP_SPECIFIC_PASSWORD" "$APPLE_TEAM_ID"; then
              echo "macOS notarization enabled with Apple ID credentials."
            else
              echo "Missing macOS notarization secrets. Provide APPLE_API_KEY, APPLE_API_KEY_ID, APPLE_API_ISSUER, or APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID." >&2
              exit 1
            fi

            du -sh apps/desktop/out apps/desktop/node_modules node_modules || true
            export DEBUG=electron-builder,electron-builder:*,electron-notarize*
            export DEBUG_COLORS=false
            run_with_timeout 960 ./node_modules/.bin/electron-builder --projectDir apps/desktop --publish never ${{ matrix.build_args }}
          else
            run_with_timeout 900 ./node_modules/.bin/electron-builder --projectDir apps/desktop --publish never ${{ matrix.build_args }}
          fi

          echo "::group::packaged release files"
          find release -maxdepth 2 -type f -exec ls -lh {} \;
          echo "::endgroup::"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            release/*.blockmap
            release/*.dmg
            release/*.exe
            release/*.yml
            release/*.zip

  publish-release:
    needs: build-electron
    permissions:
      contents: write
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download arm64 mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-artifacts/macos-arm64

      - name: Download x64 mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-x64
          path: release-artifacts/macos-x64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-artifacts/windows-x64

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release-artifacts/staged
          cp release-artifacts/macos-arm64/* release-artifacts/staged/
          cp release-artifacts/windows-x64/* release-artifacts/staged/
          find release-artifacts/macos-x64 -maxdepth 1 -type f ! -name 'latest-mac.yml' -exec cp {} release-artifacts/staged/ \;
          cp release-artifacts/macos-x64/latest-mac.yml release-artifacts/macos-x64/latest-mac-x64.yml

      - name: Merge mac update manifests
        run: |
          bun run scripts/merge-mac-update-manifests.ts \
            --arm64 release-artifacts/macos-arm64/latest-mac.yml \
            --x64 release-artifacts/macos-x64/latest-mac-x64.yml \
            --output release-artifacts/staged/latest-mac.yml

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: release-artifacts/staged/*
          generate_release_notes: true
