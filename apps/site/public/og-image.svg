<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.55" stop-color="#101010"/>
      <stop offset="1" stop-color="#17120a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="screenshotClip">
      <rect x="600" y="132" width="560" height="366" rx="28"/>
    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.85"/>

  <g opacity="0.45">
    <circle cx="960" cy="96" r="210" fill="#2f80ed" opacity="0.16"/>
    <circle cx="250" cy="610" r="260" fill="#c9a96e" opacity="0.12"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="600" y="132" width="560" height="366" rx="28" fill="#0b0b0b" stroke="#ffffff" stroke-opacity="0.14"/>
    <image href="app-screenshot.png" x="600" y="132" width="560" height="366" preserveAspectRatio="xMidYMid meet" clip-path="url(#screenshotClip)"/>
  </g>

  <g transform="translate(80 78)">
    <image href="vfactor-logo.png" x="0" y="0" width="84" height="84" preserveAspectRatio="xMidYMid meet"/>
    <text x="104" y="36" fill="#ffffff" font-family="Manrope, Inter, Arial, sans-serif" font-size="34" font-weight="700">vFactor</text>
    <text x="104" y="68" fill="#c9a96e" font-family="Fragment Mono, Menlo, monospace" font-size="15" letter-spacing="2">AI AGENT WORKSPACE</text>
  </g>

  <text x="80" y="230" fill="#ffffff" font-family="Manrope, Inter, Arial, sans-serif" font-size="58" font-weight="800">
    <tspan x="80" dy="0">A workspace for</tspan>
    <tspan x="80" dy="68">orchestrating</tspan>
    <tspan x="80" dy="68">AI agents.</tspan>
  </text>

  <text x="84" y="466" fill="#d6d6d6" font-family="Manrope, Inter, Arial, sans-serif" font-size="25" font-weight="500">
    <tspan x="84" dy="0">Bring your own models. Keep code local.</tspan>
    <tspan x="84" dy="36">Go from prompt to pull request.</tspan>
  </text>

  <g transform="translate(84 540)">
    <rect x="0" y="0" width="56" height="56" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <image href="brands/openai-symbol-light.svg" x="15" y="15" width="26" height="26"/>
    <rect x="72" y="0" width="56" height="56" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <image href="brands/claude-color.svg" x="14" y="14" width="28" height="28"/>
    <rect x="144" y="0" width="56" height="56" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
    <image href="brands/opencode-light.svg" x="15" y="15" width="26" height="26"/>
    <text x="220" y="36" fill="#f4f4f5" font-family="Manrope, Inter, Arial, sans-serif" font-size="20" font-weight="650">Codex, Claude Code, OpenCode</text>
  </g>
</svg>
